# MFTC Production Nginx Config
# Domain: halal.sucofindo.co.id
# - /api/* dan /sanctum/* → reverse proxy ke Laravel (php artisan serve / php-fpm di 127.0.0.1:8000)
# - /* → React SPA build di /var/www/mftc/frontend/dist

# ---- HTTP server (aktif sekarang; ganti ke redirect 301 saat SSL siap) ----
server {
    listen 80;
    listen [::]:80;
    server_name halal.sucofindo.co.id;

    root /var/www/mftc/frontend/dist;
    index index.html;

    client_max_body_size 12M;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Setelah SSL aktif, uncomment baris berikut dan hapus blok di bawahnya:
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json;

    # Laravel API
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Sanctum CSRF cookie / SPA auth endpoints
    location /sanctum/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Filament admin panel (Laravel)
    location /admin {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Static asset caching (immutable, 1 year)
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp|avif|map)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

